<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="assests/css/conta.css">
    <title>Conta</title>
</head>
<body class="d-flex align-items-center py-4 bg-body-tertiary h-100">
  <main class="w-100 m-auto form-container">
    <form>
      <h1>
        <img src="assests/imagens/bouillon.png" class="mb-3" height="100" width="120">
        Bouillon
      </h1>

      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="floatingUsername" placeholder="nome_usuario">
        <label for="floatingUsername">Nome de usuário</label>
      </div>

      <div class="form-floating mb-3">
        <input type="email" class="form-control" id="floatingEmail" placeholder="nome@exemplo.com">
        <label for="floatingEmail">Email</label>
      </div>

      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="floatingPassword" placeholder="Senha">
        <label for="floatingPassword">Senha</label>
      </div>

      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="floatingConfirmPassword" placeholder="Confirme a senha">
        <label for="floatingConfirmPassword">Digite a senha novamente</label>
      </div> 

      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="floatingConfirmPassword" placeholder="Confirme a senha">
        <label for="floatingConfirmPassword">CPF/CNPJ</label>
      </div>

      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="floatingConfirmPassword" placeholder="Confirme a senha">
        <label for="floatingConfirmPassword">Data de nascimento</label>
      </div>

      <button type="submit" class="btn btn-primary">Cadastre-se</button>
    </form>
  </main>
</body>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
