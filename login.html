<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Importação do framework Bootstrap 5 para estilização e componentes responsivos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Importação do CSS personalizado da página de login -->
    <link rel="stylesheet" href="assests/css/login.css">
    <title>Bouillon</title>
</head>

<!-- Codigo da tela de login - centralizada vertical e horizontalmente na tela -->
<body class="d-flex align-items-center py-4 bg-body-tertiary h-100">

    <!-- Contêiner principal do formulário de login -->
    <main class="w-100 m-auto form-container">
        <form>

            <!-- Logo e nome do site no topo do formulário -->
            <h1> <img id="foto" src="assests/imagens/bouillon.png">Bouillon</h1>

            <!-- Campo de entrada do e-mail com label flutuante -->
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
                <label for="floatingInput">Digite seu email</label>
            </div>

            <!-- Campo de entrada da senha com label flutuante -->
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
                <label for="floatingPassword">Senha</label>
            </div>

            <!-- Link para a página de criação de conta (abre em nova aba) -->
            <a href="conta.html" target="_blank"> Crie sua conta</a>
            <p></p>

            <!-- Botão para realizar o login -->
            <button type="button" class="btn btn-primary ">Logar</button>

        </form>
    </main>

    <!-- Importação do JavaScript do Bootstrap (necessário para componentes interativos) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
